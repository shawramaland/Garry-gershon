name: Battleship Contribution Graph

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Battleship SVG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: shawramaland
        run: python generate_battleship.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add battleship.svg
          git diff --staged --quiet || git commit -m "chore: update battleship contribution graph"
          git push
